<div class="container">
  <div class="row justify-content-center mt-5">
    <div class="col-12 col-md-11 col-lg-9 col-xl-7">
      <div class="card shadow">
        <div class="card-body p-5">
          <h2 class="text-center mb-3">Task Analysis</h2>
          <h4 class="text-center mb-4">Elfelejtett jelszó</h4>

          <div *ngIf="successMessage" class="alert alert-success" role="alert">
            <i class="bi bi-check-circle me-2"></i>{{ successMessage }}
          </div>

          <div *ngIf="errorMessage" class="alert alert-danger" role="alert">
            <i class="bi bi-exclamation-circle me-2"></i>{{ errorMessage }}
          </div>

          <p class="text-muted mb-4">
            Add meg az email címed és küldünk egy linket a jelszó visszaállításához.
          </p>

          <form [formGroup]="forgotPasswordForm" (ngSubmit)="onSubmit()">
            <div class="mb-3">
              <label for="email" class="form-label">Email cím</label>
              <input
                type="email"
                class="form-control"
                id="email"
                formControlName="email"
                [class.is-invalid]="email?.invalid && email?.touched"
                placeholder="pelda@email.com"
              />
              <div class="invalid-feedback" *ngIf="email?.invalid && email?.touched">
                <div *ngIf="email?.errors?.['required']">Az email cím megadása kötelező</div>
                <div *ngIf="email?.errors?.['email']">Érvényes email címet adj meg</div>
              </div>
            </div>

            <button
              type="submit"
              class="btn btn-primary w-100 mb-3"
              [disabled]="forgotPasswordForm.invalid || isLoading"
            >
              <span *ngIf="isLoading" class="spinner-border spinner-border-sm me-2"></span>
              {{ isLoading ? 'Küldés...' : 'Jelszó visszaállítási link küldése' }}
            </button>

            <div class="text-center">
              <p class="mb-0">
                Visszamehetünk a
                <a routerLink="/login" class="text-decoration-none">bejelentkezéshez</a>
              </p>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
