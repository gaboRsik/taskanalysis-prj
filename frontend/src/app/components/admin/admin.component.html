<div class="container mt-4">
  <div class="row">
    <div class="col-12">
      <h2 class="mb-4">
        <i class="bi bi-shield-lock me-2"></i>User Management
      </h2>

      <div *ngIf="successMessage" class="alert alert-success alert-dismissible fade show" role="alert">
        <i class="bi bi-check-circle me-2"></i>{{ successMessage }}
        <button type="button" class="btn-close" (click)="successMessage = ''" aria-label="Close"></button>
      </div>

      <div *ngIf="errorMessage" class="alert alert-danger alert-dismissible fade show" role="alert">
        <i class="bi bi-exclamation-circle me-2"></i>{{ errorMessage }}
        <button type="button" class="btn-close" (click)="errorMessage = ''" aria-label="Close"></button>
      </div>

      <div *ngIf="isLoading" class="text-center py-5">
        <div class="spinner-border text-primary" role="status">
          <span class="visually-hidden">Loading...</span>
        </div>
        <p class="mt-2">Loading users...</p>
      </div>

      <div *ngIf="!isLoading && users.length === 0" class="alert alert-info">
        <i class="bi bi-info-circle me-2"></i>No users found.
      </div>

      <div *ngIf="!isLoading && users.length > 0" class="card shadow-sm">
        <div class="card-body p-0">
          <div class="table-responsive">
            <table class="table table-hover mb-0">
              <thead class="table-light">
                <tr>
                  <th>ID</th>
                  <th>Name</th>
                  <th>Email</th>
                  <th>Role</th>
                  <th>Created</th>
                  <th>Actions</th>
                </tr>
              </thead>
              <tbody>
                <tr *ngFor="let user of users">
                  <td>{{ user.id }}</td>
                  <td>
                    <strong>{{ user.name }}</strong>
                  </td>
                  <td>{{ user.email }}</td>
                  <td>
                    <span 
                      class="badge" 
                      [class.bg-danger]="user.role === 'ADMIN'"
                      [class.bg-primary]="user.role === 'USER'">
                      {{ user.role }}
                    </span>
                  </td>
                  <td>{{ user.createdAt | date:'short' }}</td>
                  <td>
                    <div class="btn-group" role="group">
                      <button
                        *ngIf="user.role !== 'ADMIN'"
                        type="button"
                        class="btn btn-sm btn-outline-danger"
                        (click)="onRoleChange(user, 'ADMIN')"
                        title="Make Admin">
                        <i class="bi bi-shield-fill-check"></i> Make Admin
                      </button>
                      <button
                        *ngIf="user.role !== 'USER'"
                        type="button"
                        class="btn btn-sm btn-outline-primary"
                        (click)="onRoleChange(user, 'USER')"
                        title="Make User">
                        <i class="bi bi-person-fill"></i> Make User
                      </button>
                    </div>
                  </td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>

      <div class="mt-3 text-muted">
        <small>
          <i class="bi bi-info-circle me-1"></i>
          Total users: {{ users.length }}
        </small>
      </div>
    </div>
  </div>
</div>
