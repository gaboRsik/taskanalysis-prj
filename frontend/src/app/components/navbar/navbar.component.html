<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
  <div class="container-fluid">
    <a class="navbar-brand" routerLink="/dashboard">
      <i class="bi bi-clock-history me-2"></i>
      Task Analysis
    </a>

    <button
      class="navbar-toggler"
      type="button"
      data-bs-toggle="collapse"
      data-bs-target="#navbarNav"
      aria-controls="navbarNav"
      aria-expanded="false"
      aria-label="Toggle navigation"
    >
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="navbarNav">
      <ul class="navbar-nav me-auto" *ngIf="isAuthenticated()">
        <li class="nav-item">
          <a class="nav-link" routerLink="/dashboard" routerLinkActive="active">
            <i class="bi bi-house-door me-1"></i>
            Dashboard
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link" routerLink="/tasks" routerLinkActive="active">
            <i class="bi bi-list-task me-1"></i>
            Tasks
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link" routerLink="/categories" routerLinkActive="active">
            <i class="bi bi-folder me-1"></i>
            Categories
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link" routerLink="/templates" routerLinkActive="active">
            <i class="bi bi-file-earmark-text me-1"></i>
            Templates
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link" routerLink="/profile" routerLinkActive="active">
            <i class="bi bi-person-circle me-1"></i>
            Profile
          </a>
        </li>
      </ul>

      <div class="navbar-nav ms-auto" *ngIf="isAuthenticated()">
        <span class="navbar-text text-white me-3">
          <i class="bi bi-person-circle me-1"></i>
          {{ currentUser?.name }}
        </span>
        <button 
          class="btn btn-outline-light btn-sm me-2" 
          (click)="toggleTheme()"
          [attr.aria-label]="(themeService.theme$ | async) === 'dark' ? 'Switch to light mode' : 'Switch to dark mode'">
          <ng-container *ngIf="(themeService.theme$ | async) === 'dark'">
            <i class="bi bi-sun-fill me-1"></i> Light
          </ng-container>
          <ng-container *ngIf="(themeService.theme$ | async) === 'light'">
            <i class="bi bi-moon-fill me-1"></i> Dark
          </ng-container>
        </button>
        <button class="btn btn-outline-light btn-sm" (click)="logout()">
          <i class="bi bi-box-arrow-right me-1"></i>
          Logout
        </button>
      </div>
    </div>
  </div>
</nav>
